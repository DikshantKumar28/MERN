<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu | ZaykaBox Elite Menu Layout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Satisfy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Top Utility Bar -->
  <div class="top-utility-bar" aria-label="Store utility information">
    <div class="store-hours">
      <span>🕒 Store Hours: <strong>09:00 am - 06:00 pm</strong></span>
    </div>
    <div class="social-links">
      <a href="#" aria-label="Facebook">FB</a>
      <a href="#" aria-label="Twitter">TW</a>
      <a href="#" aria-label="Instagram">IG</a>
      <a href="#" aria-label="Pinterest">PIN</a>
    </div>
  </div>

  <!-- Main Header -->
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <a class="brand nav-link" href="index.html">
        <span class="brand-mark">Zb</span>
        <span>ZaykaBox</span>
      </a>

      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Toggle navigation menu">
        <span></span><span></span><span></span>
      </button>

      <div class="nav-menu" id="navMenu">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="menu.html">Menu</a>
        <a class="nav-link" href="restaurants.html">Restaurants</a>
        <a class="nav-link" href="offers.html">Offers/Deals</a>
        <a class="nav-link" href="track.html">Track Order</a>
        <a class="nav-link" href="login.html">Login/Register</a>
      </div>

      <div class="nav-actions">
        <button class="icon-button" id="themeToggle" type="button" aria-label="Luxury Indicator">👑 Luxury</button>
        <button class="cart-button" id="openCart" type="button" onclick="window.location.href='checkout.html'" aria-label="Open cart">
          <span>🛒 Cart</span>
          <strong class="cart-count">0</strong>
        </button>
      </div>
    </nav>
  </header>

  <main>
    <!-- Dual-Panel Split Layout -->
    <div class="menu-split-layout fade-up">
      
      <!-- Left Visual Hero Panel -->
      <aside class="menu-left-panel">
        <img id="restaurantImage" class="backdrop" src="https://images.unsplash.com/photo-1495521821757-a1efb6729352?auto=format&fit=crop&w=800&q=80" alt="Gourmet Food Backdrop">
        <div class="overlay">
          <h2 id="restaurantName">Check Out Our Menus</h2>
          <p id="restaurantMeta">Select a restaurant from our listing to browse their exclusive food categories.</p>
        </div>
      </aside>

      <!-- Right Interactive Menu Listing Panel -->
      <section class="menu-right-panel" id="menuListingPanel">
        <!-- Rendered dynamically by script.js -->
        <div style="padding: 40px; text-align: center;">
          <h3>Loading gourmet menus...</h3>
        </div>
      </section>
    </div>
  </main>

  <!-- Bottom Floating Pill Shortcut Menu Navigation -->
  <div class="floating-pill-nav">
    <a href="#menuListingPanel" class="active">Menu</a>
    <a href="restaurants.html">Restaurants</a>
    <a href="checkout.html" id="pillCheckoutBtn">Checkout (<span class="cart-count">0</span>)</a>
  </div>

  <!-- Cart FAB -->
  <button id="cartFab" class="cart-fab" aria-label="Go to checkout">
    🛒
    <span class="fab-count cart-count">0</span>
  </button>

  <script src="script.js"></script>
</body>
</html>
